substitutions:
  name: image-display
  friendly_name: "Image Display"

esp32:
  variant: ESP32P4
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - component.update: img_1
    - component.update: img_2

external_components:
  - source: github://kvj/esphome@jd9365_gsl3680
    components: [gsl3680]
  - source: github://jtenniswood/image-experiment@main
    components: [runtime_image]

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    default_transition_length: 250ms
    restore_mode: ALWAYS_ON

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

touchscreen:
  - platform: gsl3680
    id: tft_touch
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false

display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: tft_display
    reset_pin: GPIO27
    rotation: 90
    auto_clear_enabled: false
    color_order: RGB
    dimensions:
      width: 800
      height: 1280

http_request:

online_image:
  - url: "https://github.com/jtenniswood/image-test/blob/main/1.jpeg?raw=true"
    format: JPEG
    id: img_1
    resize: 800x800
    type: RGB565
    byte_order: little_endian
    on_download_finished:
      - lvgl.image.update:
          id: lv_img_1
          src: img_1

  - url: "https://github.com/jtenniswood/image-test/blob/main/2.jpeg?raw=true"
    format: JPEG
    id: img_2
    resize: 800x800
    type: RGB565
    byte_order: little_endian
    on_download_finished:
      - lvgl.image.update:
          id: lv_img_2
          src: img_2

lvgl:
  displays:
    - tft_display
  touchscreens:
    - tft_touch
  page_wrap: true
  pages:
    - id: page_1
      bg_color: 0x000000
      widgets:
        - obj:
            width: 1280
            height: 800
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - lvgl.page.next:
                  animation: FADE_IN
                  time: 300ms
            widgets:
              - image:
                  id: lv_img_1
                  src: img_1
                  align: CENTER
    - id: page_2
      bg_color: 0x000000
      widgets:
        - obj:
            width: 1280
            height: 800
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - lvgl.page.next:
                  animation: FADE_IN
                  time: 300ms
            widgets:
              - image:
                  id: lv_img_2
                  src: img_2
                  align: CENTER
